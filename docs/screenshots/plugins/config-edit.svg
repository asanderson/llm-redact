<text x="22" y="75" fill="#7ee787" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" xml:space="preserve">&gt; /llm-redact:config-edit add "project aurora" as a deny string and trial phone_number in warn mod</text>
