<svg xmlns="http://www.w3.org/2000/svg" width="820" height="787" viewBox="0 0 820 787" role="img" aria-label="terminal output of Claude Code — /llm-redact:config-edit">
<rect width="820" height="787" rx="10" fill="#0d1117"/>
<path d="M0 10a10 10 0 0 1 10-10h800a10 10 0 0 1 10 10v30h-820z" fill="#161b22"/>
<circle cx="24" cy="20" r="6" fill="#ff5f57"/>
