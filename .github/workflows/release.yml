name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
      id-token: write # sign the build provenance attestation (Sigstore)
      attestations: write # store it in the repo's attestation log
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.13"
          enable-cache: false
      - run: uv build
      - run: uvx twine check dist/*
      # Machine-readable SBOM (CycloneDX) for the exported runtime closure,
      # attached to the Release next to the dist files. The human-readable
      # companion — every package and WHY it was chosen — is
      # docs/dependencies.md.
      - run: uv export --frozen --no-dev --no-emit-project -o sbom-requirements.txt
      - run: |
          mkdir -p sbom
          uvx --from cyclonedx-bom cyclonedx-py requirements sbom-requirements.txt \
            -o sbom/llm-redact-runtime.cdx.json
      # Signed provenance for the exact bytes attached to the Release:
      # verifiable with `gh attestation verify <file> --repo <this repo>`.
      # (PyPI uploads get separate PEP 740 attestations from the trusted
      # publisher in publish-pypi.) GitHub cannot persist attestations for
      # user-owned PRIVATE repos (this failed the v0.6.0 run), so the step
      # self-skips there and stays loud on public repos.
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        if: ${{ !github.event.repository.private }}
        with:
          subject-path: |
            dist/*
            sbom/*
      # Self-test the provenance we just created: a consumer runs exactly this
      # `gh attestation verify` to trust a downloaded artifact, so proving it
      # passes here means the published attestation is actually verifiable (and
      # catches a broken attest step before anyone relies on it). Public only —
      # attestations are not persisted for private repos.
      - name: verify build provenance
        if: ${{ !github.event.repository.private }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for artifact in dist/* sbom/*; do
            echo "::group::verify $artifact"
            gh attestation verify "$artifact" --repo "$GITHUB_REPOSITORY"
            echo "::endgroup::"
          done
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        # Creating the tag through GitHub's Releases UI already creates the
        # release object; in that case attach the dist files to it instead
        # of failing on the name collision.
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* sbom/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* sbom/* --generate-notes
          fi

  publish-pypi:
    runs-on: ubuntu-latest
    needs: build
    # PyPI publishing is HELD while the repository is private: publishing
    # the sdist/wheel would make the source public regardless of repo
    # visibility, so visibility is the deliberate switch. The job
    # self-skips instead of failing red on every release run; making the
    # repo public arms it, and it then still needs the one-time PyPI
    # trusted-publisher setup — see docs/RELEASING.md.
    if: ${{ !github.event.repository.private }}
    environment: pypi
    permissions:
      id-token: write # OIDC for trusted publishing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.13"
          enable-cache: false
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

  publish-ghcr:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
      id-token: write # keyless cosign signing via the Sigstore OIDC token
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # Multi-arch: arm64 covers Apple Silicon and Graviton hosts, built
      # via QEMU emulation (slow, but release-only — CI's container smoke
      # jobs stay native amd64).
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: runtime
          platforms: linux/amd64,linux/arm64
          # BuildKit-generated image SBOM attestation, stored alongside the
          # manifest in GHCR (docker buildx imagetools inspect shows it).
          sbom: true
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      # Keyless cosign signature over the pushed manifest DIGEST (not a tag —
      # tags move, digests do not). Consumers verify with
      # `cosign verify ghcr.io/<repo>@<digest>
      #   --certificate-identity-regexp 'https://github.com/<owner>/<repo>/.*'
      #   --certificate-oidc-issuer https://token.actions.githubusercontent.com`.
      # Complements the BuildKit SBOM attestation above: SBOM says WHAT is in
      # the image, the signature says WHO built it and that it is unmodified.
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      # NOTE (R4 open-core split): the -rdbms image variant (stock image plus the
      # vault-postgres/vault-mysql/crypto extras for a server RDBMS vault) moved
      # to the private llm-redact-pro release — the server RDBMS vault is a Pro
      # feature, so a Free public image that bundled those drivers would ship a
      # capability it fails closed on. The Free image below is the only artifact.
      - name: sign the image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "ghcr.io/${GITHUB_REPOSITORY}@${DIGEST}"
