name: Scorecard

# OpenSSF Scorecard: automated supply-chain posture checks (pinned actions,
# branch protection, token permissions, dangerous workflow patterns, etc.),
# uploaded to the code-scanning dashboard and — on the default branch — to the
# public Scorecard results log so the badge stays current.
#
# The job self-skips while this repository is private: Scorecard's result
# publishing and the code-scanning SARIF upload assume a public repo, so it
# arms on go-public exactly like PyPI publishing and build attestations. A
# maintainer can trigger it manually once public with workflow_dispatch; the
# schedule below re-checks weekly.
on:
  branch_protection_rule:
  schedule:
    - cron: "23 5 * * 1"
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    # Affirmative public check: `private == false` is only true when the
    # repository context is present AND public. On schedule events (where the
    # repository context is absent) and while private, this is false, so the
    # job skips rather than failing on the SARIF upload.
    if: ${{ github.event.repository.private == false }}
    permissions:
      security-events: write # upload the SARIF to code scanning
      id-token: write # publish signed results to the Scorecard log
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5
      - uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: results.sarif
