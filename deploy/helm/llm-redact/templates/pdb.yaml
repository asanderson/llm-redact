{{- if and (eq .Values.mode "standalone") .Values.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "llm-redact.fullname" . }}
  labels:
    {{- include "llm-redact.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "llm-redact.selectorLabels" . | nindent 6 }}
{{- end }}
