{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "llm-redact.fullname" . }}
  labels:
    {{- include "llm-redact.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "llm-redact.selectorLabels" . | nindent 6 }}
  policyTypes: ["Ingress"]
  {{- if eq .Values.mode "standalone" }}
  ingress:
    - from:
        - podSelector:
            {{- if .Values.networkPolicy.allowFrom }}
            matchLabels:
              {{- toYaml .Values.networkPolicy.allowFrom | nindent 14 }}
            {{- else }}
            {} # any pod in THIS namespace (cross-namespace stays blocked)
            {{- end }}
      ports:
        - { port: 8787, protocol: TCP }
  {{- else }}
  # Sidecar: default-deny ingress. Loopback traffic inside the pod (the tool
  # -> proxy path, and the exec probes) never crosses the CNI, so this only
  # closes the pod-IP surface — belt-and-braces on top of the 127.0.0.1 bind.
  ingress: []
  {{- end }}
{{- end }}
